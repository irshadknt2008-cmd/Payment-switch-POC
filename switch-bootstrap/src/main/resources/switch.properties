# ============================================================
# Payment Switch – Application Configuration
# ============================================================

# ── Acquirer Server (Neapay Acquirer connects here) ───────────
acquirer.port=9998

# ── Database (PostgreSQL) ─────────────────────────────────────
DB_HOST=localhost
DB_PORT=5432
DB_NAME=payment_switch
DB_USER=postgres
DB_PASSWORD=postgres
DB_POOL_SIZE=10

# ── Issuers (Neapay Issuer simulator) ─────────────────────────
# Comma-separated issuer IDs. For each ID set: issuer.<id>.host/.port/.pool
issuers=9009
issuer.9009.host=127.0.0.1
issuer.9009.port=9009
issuer.9009.pool=1

# Default issuer for network-management messages (no PAN)
default.issuer=9009
